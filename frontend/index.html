<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IR.ai — IDX Intelligence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg: #050505;
            --surface: #0a0a0a;
            --surface-hover: #0f0f0f;
            --border: #1a1a1a;
            --border-active: #00d9ff;
            --text: #e0e0e0;
            --text-dim: #5a5a5a;
            --text-muted: #3a3a3a;
            --accent: #00d9ff;
            --accent-glow: rgba(0, 217, 255, 0.15);
            --positive: #00ff9d;
            --negative: #ff4757;
            --neutral: #6b7280;
            --impact-high: #ffaa00;
            --impact-med: #00d9ff;
            --impact-low: #4a4a4a;
            --radius: 4px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: var(--accent);
            color: var(--bg);
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 0.9rem;
            display: grid;
            place-items: center;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .logo-text h1 {
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .logo-text p {
            font-size: 0.65rem;
            color: var(--text-muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .header-meta {
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        .date-display {
            text-align: right;
        }

        .date-display .label {
            font-size: 0.6rem;
            color: var(--text-muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .date-display .value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        .summary-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1px;
            background: var(--border);
            border: 1px solid var(--border);
            margin-bottom: 2rem;
            border-radius: var(--radius);
            overflow: hidden;
        }

        .stat-card {
            background: var(--surface);
            padding: 1.25rem;
            position: relative;
        }

        .stat-card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: var(--border);
        }

        .stat-card:last-child::after {
            display: none;
        }

        .stat-label {
            font-size: 0.6rem;
            color: var(--text-muted);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.75rem;
            font-weight: 500;
            color: var(--text);
        }

        .stat-positive { color: var(--positive); }
        .stat-negative { color: var(--negative); }
        .stat-high { color: var(--impact-high); }

        .announcements-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 1px;
            background: var(--border);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        .announcement-card {
            background: var(--surface);
            padding: 1.25rem;
            cursor: pointer;
            transition: background 0.15s ease;
            position: relative;
        }

        .announcement-card:hover {
            background: var(--surface-hover);
        }

        .announcement-card:hover .ticker-badge {
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent-glow);
        }

        .announcement-card:hover .card-preview {
            color: var(--text);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        .ticker-badge {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text);
            transition: all 0.2s ease;
        }

        .sentiment-badge {
            font-size: 0.6rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 0.2rem 0.5rem;
            border-radius: 2px;
        }

        .sentiment-positive {
            background: rgba(0, 255, 157, 0.1);
            color: var(--positive);
            border: 1px solid rgba(0, 255, 157, 0.2);
        }

        .sentiment-negative {
            background: rgba(255, 71, 87, 0.1);
            color: var(--negative);
            border: 1px solid rgba(255, 71, 87, 0.2);
        }

        .sentiment-neutral {
            background: rgba(107, 114, 128, 0.1);
            color: var(--neutral);
            border: 1px solid rgba(107, 114, 128, 0.2);
        }

        .impact-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
        }

        .impact-label {
            font-size: 0.55rem;
            color: var(--text-muted);
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .impact-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }

        .impact-high { background: var(--impact-high); box-shadow: 0 0 8px rgba(255, 170, 0, 0.4); }
        .impact-med { background: var(--impact-med); box-shadow: 0 0 8px rgba(0, 217, 255, 0.4); }
        .impact-low { background: var(--impact-low); }

        .card-preview {
            font-size: 0.8rem;
            color: var(--text-dim);
            line-height: 1.6;
            margin-bottom: 0.75rem;
        }

        .card-footer {
            font-size: 0.65rem;
            color: var(--text-muted);
            padding-top: 0.75rem;
            border-top: 1px solid var(--border);
        }

        .card-footer a {
            color: var(--accent);
            text-decoration: none;
            transition: opacity 0.15s;
        }

        .card-footer a:hover {
            opacity: 0.7;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(12px);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        .modal-overlay.active .modal {
            transform: scale(1);
            opacity: 1;
        }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border-active);
            border-radius: var(--radius);
            max-width: 700px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 2rem;
            box-shadow: 0 0 60px var(--accent-glow);
            transform: scale(0.98);
            opacity: 0;
            transition: all 0.2s ease;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .modal-ticker {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
            text-shadow: 0 0 20px var(--accent-glow);
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0.25rem 0.5rem;
            transition: color 0.15s;
            font-family: 'Inter', sans-serif;
            line-height: 1;
        }

        .modal-close:hover {
            color: var(--text);
        }

        .modal-meta {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .modal-sentiment {
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 0.3rem 0.6rem;
            border-radius: 2px;
        }

        .modal-sentiment.positive {
            background: rgba(0, 255, 157, 0.1);
            color: var(--positive);
            border: 1px solid rgba(0, 255, 157, 0.2);
        }

        .modal-sentiment.negative {
            background: rgba(255, 71, 87, 0.1);
            color: var(--negative);
            border: 1px solid rgba(255, 71, 87, 0.2);
        }

        .modal-sentiment.neutral {
            background: rgba(107, 114, 128, 0.1);
            color: var(--neutral);
            border: 1px solid rgba(107, 114, 128, 0.2);
        }

        .modal-impact {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.65rem;
            color: var(--text-dim);
        }

        .modal-impact .impact-dot {
            width: 8px;
            height: 8px;
        }

        .modal-analysis {
            font-size: 0.85rem;
            line-height: 1.7;
            color: var(--text-dim);
        }

        .modal-analysis h1, .modal-analysis h2, .modal-analysis h3 {
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            color: var(--text);
            margin: 1.25rem 0 0.5rem;
            font-size: 1rem;
        }

        .modal-analysis h2 { font-size: 0.95rem; }
        .modal-analysis h3 { font-size: 0.9rem; }

        .modal-analysis p {
            margin-bottom: 0.75rem;
        }

        .modal-analysis ul, .modal-analysis ol {
            margin: 0.5rem 0 0.75rem 1.25rem;
        }

        .modal-analysis li {
            margin-bottom: 0.25rem;
        }

        .modal-analysis strong {
            color: var(--text);
            font-weight: 600;
        }

        .modal-analysis em {
            color: var(--accent);
            font-style: italic;
        }

        .modal-analysis code {
            background: var(--bg);
            padding: 0.15rem 0.3rem;
            border-radius: 2px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
        }

        .modal-source {
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        .modal-source a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
            transition: opacity 0.15s;
        }

        .modal-source a:hover {
            opacity: 0.7;
            text-decoration: underline;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
        }

        .empty-state h2 {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-dim);
            margin-bottom: 0.5rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .empty-state p {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        @media (max-width: 768px) {
            .container { padding: 1rem; }
            .summary-stats { grid-template-columns: repeat(2, 1fr); }
            .announcements-grid { grid-template-columns: 1fr; }
            header { flex-direction: column; gap: 1rem; text-align: center; }
            .header-meta { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <div class="logo-icon">IR</div>
                <div class="logo-text">
                    <h1>Investor Relations</h1>
                    <p>IDX Intelligence</p>
                </div>
            </div>
            <div class="header-meta">
                <div class="date-display">
                    <div class="label">Date</div>
                    <div class="value" id="currentDate"></div>
                </div>
            </div>
        </header>

        <div class="summary-stats" id="statsGrid">
            <div class="stat-card">
                <div class="stat-label">Total</div>
                <div class="stat-value" id="totalCount">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Positive</div>
                <div class="stat-value stat-positive" id="positiveCount">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Negative</div>
                <div class="stat-value stat-negative" id="negativeCount">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">High Impact</div>
                <div class="stat-value stat-high" id="highImpactCount">0</div>
            </div>
        </div>

        <div class="announcements-grid" id="announcementsGrid">
            <div class="empty-state">
                <h2>No Data</h2>
                <p>Run analysis to populate dashboard</p>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-ticker" id="modalTicker"></div>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-meta">
                <span class="modal-sentiment" id="modalSentiment"></span>
                <div class="modal-impact">
                    <span class="impact-label">Impact:</span>
                    <span class="impact-dot" id="modalImpact"></span>
                    <span id="modalImpactLabel"></span>
                </div>
            </div>
            <div class="modal-analysis" id="modalAnalysis"></div>
            <div class="modal-source" id="modalSource"></div>
        </div>
    </div>

    <script>
        const TODAY = new Date().toISOString().split('T')[0];
        document.getElementById('currentDate').textContent = new Date().toLocaleDateString('en-US', {
            weekday: 'short',
            year: 'numeric',
            month: 'short',
            day: 'numeric'
        });

        async function loadResults() {
            try {
                const response = await fetch('results.json');
                if (!response.ok) {
                    renderEmpty();
                    return;
                }
                const data = await response.json();
                currentData = data;
                renderDashboard(data);
            } catch (error) {
                renderEmpty();
            }
        }

        function extractSentiment(text) {
            const upper = text.toUpperCase();
            if (upper.includes('POSITIVE')) return 'positive';
            if (upper.includes('NEGATIVE')) return 'negative';
            return 'neutral';
        }

        function extractImpact(text) {
            const upper = text.toUpperCase();
            if (upper.includes('HIGH')) return 'high';
            if (upper.includes('MEDIUM')) return 'medium';
            return 'low';
        }

        function renderDashboard(items) {
            document.getElementById('totalCount').textContent = items.length;

            let positive = 0, negative = 0, highImpact = 0;

            items.forEach(item => {
                const sentiment = extractSentiment(item.analysis);
                const impact = extractImpact(item.analysis);

                if (sentiment === 'positive') positive++;
                if (sentiment === 'negative') negative++;
                if (impact === 'high') highImpact++;
            });

            document.getElementById('positiveCount').textContent = positive;
            document.getElementById('negativeCount').textContent = negative;
            document.getElementById('highImpactCount').textContent = highImpact;

            const grid = document.getElementById('announcementsGrid');
            grid.innerHTML = items.map((item, index) => {
                const sentiment = extractSentiment(item.analysis);
                const impact = extractImpact(item.analysis);
                const preview = item.analysis.substring(0, 180).replace(/[#*_\n]/g, ' ');

                return `
                    <div class="announcement-card" onclick="openModal(${index})">
                        <div class="card-header">
                            <span class="ticker-badge">${item.Ticker}</span>
                            <span class="sentiment-badge sentiment-${sentiment}">${sentiment}</span>
                        </div>
                        <div class="impact-row">
                            <span class="impact-label">Impact</span>
                            <span class="impact-dot impact-${impact === 'medium' ? 'med' : impact}"></span>
                        </div>
                        <div class="card-preview">${preview}...</div>
                        <div class="card-footer">
                            <a href="${item.source}" target="_blank" onclick="event.stopPropagation()">PDF Source</a>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderEmpty() {
            document.getElementById('announcementsGrid').innerHTML = `
                <div class="empty-state">
                    <h2>No Data</h2>
                    <p>Run analysis to populate dashboard</p>
                </div>
            `;
        }

        let currentData = [];

        async function openModal(index) {
            const item = currentData[index];
            if (!item) return;

            const sentiment = extractSentiment(item.analysis);
            const impact = extractImpact(item.analysis);

            document.getElementById('modalTicker').textContent = item.Ticker;
            document.getElementById('modalSentiment').textContent = sentiment;
            document.getElementById('modalSentiment').className = `modal-sentiment ${sentiment}`;
            document.getElementById('modalImpact').className = `impact-dot impact-${impact === 'medium' ? 'med' : impact}`;
            document.getElementById('modalImpactLabel').textContent = impact;
            document.getElementById('modalAnalysis').innerHTML = marked.parse(item.analysis);
            document.getElementById('modalSource').innerHTML = `<a href="${item.source}" target="_blank">View Original PDF Source</a>`;

            const overlay = document.getElementById('modalOverlay');
            overlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
            document.body.style.overflow = '';
        }

        document.getElementById('modalOverlay').addEventListener('click', (e) => {
            if (e.target === document.getElementById('modalOverlay')) {
                closeModal();
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        loadResults();
    </script>
</body>
</html>
